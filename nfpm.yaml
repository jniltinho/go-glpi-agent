# nfpm configuration for building .deb/.rpm packages.
# https://nfpm.goreleaser.com
# Build the binary first (make build-all), then: make package-deb / package-rpm.
name: go-glpi-agent
arch: amd64
platform: linux
version: ${VERSION}
maintainer: Nilton Oliveira <jniltinho@gmail.com>
description: |
  Go inventory agent for GLPI (native JSON) and legacy OCS/FusionInventory (XML).
  Collects local Linux hardware and software inventory and sends it to a GLPI
  10+ server or writes it to a local XML file.
vendor: jniltinho
homepage: https://github.com/jniltinho/go-glpi-agent
license: GPL-2.0-or-later

contents:
  - src: ./dist/go-glpi-agent
    dst: /opt/go-glpi-agent/go-glpi-agent
  - src: ./contrib/agent.cfg
    dst: /opt/go-glpi-agent/agent.cfg
    type: "config|noreplace" # keep user edits across upgrades
  - src: ./contrib/go-glpi-agent.service
    dst: /lib/systemd/system/go-glpi-agent.service
  - src: ./contrib/go-glpi-agent.timer
    dst: /lib/systemd/system/go-glpi-agent.timer
  - src: ./contrib/go-glpi-agent-daemon.service
    dst: /lib/systemd/system/go-glpi-agent-daemon.service

overrides:
  deb:
    depends:
      - dmidecode
  rpm:
    depends:
      - dmidecode
  archlinux:
    depends:
      - dmidecode

archlinux:
  pkgbase: go-glpi-agent
  packager: Nilton Oliveira <jniltinho@gmail.com>
