<svg xmlns="http://www.w3.org/2000/svg" width="660" height="170" viewBox="0 0 660 170" role="img" aria-label="go-glpi-agent">
  <svg x="8" y="13" width="144" height="144" viewBox="0 0 256 256" overflow="visible">

  <defs>
    <linearGradient id="headMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4a6e"/>
      <stop offset="35%" stop-color="#102a43"/>
      <stop offset="70%" stop-color="#0a1f33"/>
      <stop offset="100%" stop-color="#163a55"/>
    </linearGradient>
    <linearGradient id="headShine" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8d96a"/>
      <stop offset="45%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#5a8f28"/>
    </linearGradient>
    <linearGradient id="visorShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="antennaStem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c4e8"/>
      <stop offset="100%" stop-color="#007a99"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8f07a"/>
      <stop offset="55%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#4a7a1f"/>
    </radialGradient>
    <radialGradient id="eyeInner" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8ffb0"/>
      <stop offset="40%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#3d6b18"/>
    </radialGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4ff8a"/>
      <stop offset="50%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#5a8f28"/>
    </radialGradient>
    <radialGradient id="earGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a5a7a"/>
      <stop offset="100%" stop-color="#102a43"/>
    </radialGradient>
    <linearGradient id="goText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0f0ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#102a43" flood-opacity="0.45"/>
    </filter>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tipGlowFilter" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Drop shadow base -->
  <ellipse cx="128" cy="210" rx="72" ry="14" fill="#102a43" opacity="0.25"/>

  <!-- Left ear -->
  <ellipse cx="52" cy="138" rx="18" ry="28" fill="url(#earGrad)" filter="url(#softShadow)"/>
  <ellipse cx="50" cy="132" rx="10" ry="16" fill="#00ADD8" opacity="0.35"/>
  <ellipse cx="48" cy="126" rx="5" ry="8" fill="#ffffff" opacity="0.3"/>

  <!-- Right ear -->
  <ellipse cx="204" cy="138" rx="18" ry="28" fill="url(#earGrad)" filter="url(#softShadow)"/>
  <ellipse cx="206" cy="132" rx="10" ry="16" fill="#00ADD8" opacity="0.35"/>
  <ellipse cx="208" cy="126" rx="5" ry="8" fill="#ffffff" opacity="0.3"/>

  <!-- Main head -->
  <rect x="56" y="72" width="144" height="128" rx="48" ry="48" fill="url(#headMetal)" filter="url(#softShadow)"/>

  <!-- Head edge highlight -->
  <rect x="58" y="74" width="140" height="124" rx="46" ry="46" fill="none" stroke="#00ADD8" stroke-width="2" opacity="0.25"/>

  <!-- Top shine overlay -->
  <rect x="60" y="76" width="136" height="60" rx="44" ry="30" fill="url(#headShine)"/>

  <!-- Specular highlight left -->
  <ellipse cx="88" cy="108" rx="22" ry="14" fill="#ffffff" opacity="0.18" transform="rotate(-20 88 108)"/>

  <!-- Visor band -->
  <rect x="68" y="118" width="120" height="52" rx="18" ry="18" fill="url(#visorGrad)"/>
  <rect x="70" y="120" width="116" height="24" rx="14" ry="12" fill="url(#visorShine)"/>

  <!-- Visor bottom edge -->
  <rect x="68" y="158" width="120" height="12" rx="6" ry="6" fill="#5a8f28" opacity="0.5"/>

  <!-- GO text on visor -->
  <text x="128" y="154" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="url(#goText)" letter-spacing="4">GO</text>
  <text x="128" y="154" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="none" stroke="#102a43" stroke-width="0.5" opacity="0.3" letter-spacing="4">GO</text>

  <!-- Left eye socket -->
  <circle cx="96" cy="100" r="26" fill="#0a1f33" opacity="0.6"/>

  <!-- Right eye socket -->
  <circle cx="160" cy="100" r="26" fill="#0a1f33" opacity="0.6"/>

  <!-- Left eye glow -->
  <circle cx="96" cy="100" r="22" fill="url(#eyeGlow)" filter="url(#glowFilter)"/>
  <circle cx="96" cy="100" r="18" fill="url(#eyeInner)"/>
  <circle cx="88" cy="92" r="7" fill="#ffffff" opacity="0.85"/>
  <circle cx="102" cy="106" r="3" fill="#ffffff" opacity="0.5"/>

  <!-- Right eye glow -->
  <circle cx="160" cy="100" r="22" fill="url(#eyeGlow)" filter="url(#glowFilter)"/>
  <circle cx="160" cy="100" r="18" fill="url(#eyeInner)"/>
  <circle cx="152" cy="92" r="7" fill="#ffffff" opacity="0.85"/>
  <circle cx="166" cy="106" r="3" fill="#ffffff" opacity="0.5"/>

  <!-- Chin / lower face plate -->
  <rect x="88" y="178" width="80" height="18" rx="9" ry="9" fill="#163a55"/>
  <rect x="92" y="180" width="72" height="8" rx="4" ry="4" fill="#00ADD8" opacity="0.2"/>

  <!-- Mouth grille -->
  <rect x="108" y="184" width="40" height="8" rx="4" fill="#102a43"/>
  <line x1="116" y1="184" x2="116" y2="192" stroke="#00ADD8" stroke-width="1.5" opacity="0.5"/>
  <line x1="128" y1="184" x2="128" y2="192" stroke="#00ADD8" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="184" x2="140" y2="192" stroke="#00ADD8" stroke-width="1.5" opacity="0.5"/>

  <!-- Antenna base -->
  <rect x="122" y="48" width="12" height="28" rx="6" fill="url(#antennaStem)"/>
  <ellipse cx="128" cy="48" rx="10" ry="6" fill="#00ADD8" opacity="0.4"/>

  <!-- Antenna rod -->
  <line x1="128" y1="48" x2="128" y2="22" stroke="url(#antennaStem)" stroke-width="5" stroke-linecap="round"/>

  <!-- Antenna tip glow -->
  <circle cx="128" cy="18" r="12" fill="url(#tipGlow)" filter="url(#tipGlowFilter)" opacity="0.9"/>
  <circle cx="128" cy="18" r="7" fill="#d4ff8a"/>
  <circle cx="125" cy="15" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Head top specular -->
  <ellipse cx="128" cy="82" rx="40" ry="10" fill="#ffffff" opacity="0.12"/>

  <!-- Cheek accents -->
  <ellipse cx="72" cy="148" rx="8" ry="5" fill="#00ADD8" opacity="0.15"/>
  <ellipse cx="184" cy="148" rx="8" ry="5" fill="#00ADD8" opacity="0.15"/>

  </svg>
  <text x="176" y="105" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="bold" letter-spacing="-1"><tspan fill="#00add8">go</tspan><tspan fill="#6aa329">-glpi-agent</tspan></text>
</svg>
