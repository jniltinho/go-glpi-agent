<svg xmlns="http://www.w3.org/2000/svg" width="660" height="170" viewBox="0 0 660 170" role="img" aria-label="go-glpi-agent">
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334e68"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7e05a"/>
      <stop offset="1" stop-color="#5fa224"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- robot mark (same design as logo.svg, scaled) -->
  <g transform="translate(8,-8) scale(0.66)">
    <line x1="128" y1="60" x2="128" y2="34" stroke="#00add8" stroke-width="6" stroke-linecap="round"/>
    <circle cx="128" cy="28" r="11" fill="#8cc63f" filter="url(#glow)"/>
    <rect x="36" y="120" width="20" height="44" rx="8" fill="#243b53" stroke="#00add8" stroke-width="3"/>
    <rect x="200" y="120" width="20" height="44" rx="8" fill="#243b53" stroke="#00add8" stroke-width="3"/>
    <rect x="52" y="60" width="152" height="150" rx="34" fill="url(#head)" stroke="#8cc63f" stroke-width="5"/>
    <rect x="74" y="92" width="108" height="74" rx="20" fill="#0a1622"/>
    <rect x="80" y="98" width="96" height="62" rx="16" fill="url(#visor)"/>
    <text x="128" y="142" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="46" font-weight="bold" fill="#0a1622" letter-spacing="1">GO</text>
    <rect x="92" y="182" width="72" height="10" rx="5" fill="#243b53"/>
    <rect x="92" y="182" width="46" height="10" rx="5" fill="#8cc63f"/>
  </g>

  <!-- wordmark: "go" in Go blue, "-glpi-agent" in GLPI green (both readable on light & dark) -->
  <text x="178" y="105" font-family="Verdana, Arial, sans-serif" font-size="58" font-weight="bold" letter-spacing="-1">
    <tspan fill="#00add8">go</tspan><tspan fill="#6aa329">-glpi-agent</tspan>
  </text>
</svg>
