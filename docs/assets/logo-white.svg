<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="go-glpi-agent logo (white, for dark backgrounds)">
  <!-- White line-art version for dark backgrounds -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- antenna -->
    <line x1="128" y1="60" x2="128" y2="34"/>
    <circle cx="128" cy="28" r="10" fill="#ffffff"/>
    <!-- ears -->
    <rect x="36" y="120" width="20" height="44" rx="8"/>
    <rect x="200" y="120" width="20" height="44" rx="8"/>
    <!-- head -->
    <rect x="52" y="60" width="152" height="150" rx="34"/>
    <!-- visor -->
    <rect x="76" y="94" width="104" height="70" rx="18"/>
  </g>
  <!-- GO wordmark + mouth in solid white -->
  <text x="128" y="142" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" letter-spacing="1">GO</text>
  <rect x="92" y="182" width="72" height="10" rx="5" fill="#ffffff"/>
</svg>
