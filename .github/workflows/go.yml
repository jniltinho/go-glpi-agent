name: Go Agent CI

on:
  push:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/go.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build (linux/amd64)
        run: make build-all

      - name: Compile check (windows/amd64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./...

      - name: Vet (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go vet ./...

      - name: Compile check (freebsd/amd64)
        run: CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build ./...

      - name: Vet (freebsd/amd64)
        run: GOOS=freebsd GOARCH=amd64 go vet ./...

      - name: Compile check (darwin/amd64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build ./...

      - name: Compile check (darwin/arm64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./...

      - name: Vet (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go vet ./...

  # Runs the agent on a real Windows host (WMI + registry) and validates the
  # native JSON against GLPI's schema — no Vagrant box / remote access needed.
  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o go-glpi-agent.exe .

      - name: Run inventory (real WMI/registry) + dump native JSON
        env:
          GFI_DUMP_JSON: out\inventory.json
        run: |
          mkdir out
          .\go-glpi-agent.exe run --local out --debug
          Get-ChildItem out

      - name: Validate native JSON against GLPI inventory.schema.json
        run: |
          git clone --depth 1 https://github.com/glpi-project/inventory_format
          python -m pip install --quiet check-jsonschema
          check-jsonschema --schemafile inventory_format/inventory.schema.json out/inventory.json
