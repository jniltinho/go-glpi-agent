name: release

# Publish a GitHub release with binaries, .deb/.rpm packages and a tarball
# whenever a v* tag is pushed. The version comes from the tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so `git describe` resolves the tag

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Vet + test
        run: |
          go vet ./...
          go test ./...

      - name: Build static binary
        run: make build-all

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build packages, tarball and checksums
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make packages   # .deb + .rpm + arch .pkg.tar.zst
          tar -czf "dist/go-glpi-agent_${VERSION}_linux_amd64.tar.gz" -C dist go-glpi-agent
          ( cd dist && sha256sum *.deb *.rpm *.pkg.tar.zst *.tar.gz > checksums.txt )
          ls -la dist/

      - name: Build release notes from CHANGELOG
        run: |
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { f = 1; next }
            /^## \[/ && f { exit }
            f { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release $GITHUB_REF_NAME. See CHANGELOG.md." > notes.md
          fi
          # append a Full Changelog compare link to the previous tag, if any
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "$GITHUB_REPOSITORY" "$PREV" "$GITHUB_REF_NAME" >> notes.md
          fi
          cat notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            dist/*.deb dist/*.rpm dist/*.pkg.tar.zst dist/*.tar.gz dist/checksums.txt
