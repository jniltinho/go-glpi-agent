name: release

# Publish a GitHub release with binaries, .deb/.rpm packages and a tarball
# whenever a v* tag is pushed. The version comes from the tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so `git describe` resolves the tag

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Vet + test
        run: |
          go vet ./...
          go test ./...

      - name: Build static binary
        run: make build-all

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Windows zip
        run: make package-windows VERSION="$VERSION"   # dist/go-glpi-agent_<version>_windows_amd64.zip

      - name: Install wixl (msitools) for the MSI
        run: sudo apt-get update && sudo apt-get install -y wixl msitools

      - name: Build Windows MSI
        run: make package-msi VERSION="$VERSION"        # dist/go-glpi-agent_<version>_x64.msi

      - name: Build FreeBSD tarball
        run: make package-freebsd VERSION="$VERSION"   # dist/go-glpi-agent_<version>_freebsd_amd64.tar.gz

      - name: Build packages, tarball and checksums
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make packages   # .deb + .rpm + arch .pkg.tar.zst
          tar -czf "dist/go-glpi-agent_${VERSION}_linux_amd64.tar.gz" -C dist go-glpi-agent
          ( cd dist && sha256sum *.deb *.rpm *.pkg.tar.zst *.tar.gz *.zip *.msi > checksums.txt )
          ls -la dist/

      - name: Build release notes from CHANGELOG
        run: |
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { f = 1; next }
            /^## \[/ && f { exit }
            f { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release $GITHUB_REF_NAME. See CHANGELOG.md." > notes.md
          fi
          # append a Full Changelog compare link to the previous tag, if any
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "$GITHUB_REPOSITORY" "$PREV" "$GITHUB_REF_NAME" >> notes.md
          fi
          cat notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            dist/*.deb dist/*.rpm dist/*.pkg.tar.zst dist/*.tar.gz dist/*.zip dist/*.msi dist/checksums.txt

  # Builds the macOS installers (.pkg + .dmg) on real Apple runners and uploads
  # them to the release created by the `release` job. pkgbuild/productbuild/hdiutil
  # only run on macOS, so this cannot share the Linux runner above.
  release-macos:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only for now; Intel (macos-13 / x86_64) is deferred —
          # re-add the entry here (and in macos.yml) when revisiting that arch.
          - runner: macos-latest   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build .pkg + .dmg
        run: |
          make package-macos ARCH=${{ matrix.arch }} VERSION="$VERSION"
          ( cd dist && shasum -a 256 *_${{ matrix.arch }}.pkg *_${{ matrix.arch }}.dmg > checksums_macos_${{ matrix.arch }}.txt )
          ls -lh dist/*.pkg dist/*.dmg

      - name: Upload installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/go-glpi-agent_${VERSION}_${{ matrix.arch }}.pkg \
            dist/go-glpi-agent_${VERSION}_${{ matrix.arch }}.dmg \
            dist/checksums_macos_${{ matrix.arch }}.txt \
            --clobber
