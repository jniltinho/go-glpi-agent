name: release

# Publish a GitHub release with binaries, .deb/.rpm packages and a tarball
# whenever a v* tag is pushed. The version comes from the tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git describe` resolves the tag

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Vet + test
        run: |
          go vet ./...
          go test ./...

      - name: Build static binary
        run: make build-all

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build packages, tarball and checksums
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          make package-deb package-rpm
          tar -czf "dist/go-glpi-agent_${VERSION}_linux_amd64.tar.gz" -C dist go-glpi-agent
          ( cd dist && sha256sum *.deb *.rpm *.tar.gz > checksums.txt )
          ls -la dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/checksums.txt
