# go-glpi-agent configuration (FreeBSD). INI format, compatible with the Perl
# FusionInventory/GLPI agent's agent.cfg. CLI flags override these values.
# Lines starting with '#' are comments. Quotes around values are optional.
#
# Default locations on FreeBSD:
#   binary : /opt/go-glpi-agent/go-glpi-agent
#   config : /opt/go-glpi-agent/agent.cfg   (this file)
#   state  : /opt/go-glpi-agent/var         (deviceid/agentid)

# --- Target (at least one of server/local) ---
# GLPI 10+ native endpoint (JSON); falls back to legacy XML/PROLOG automatically.
server = http://glpi.example.com/front/inventory.php
# Or write the inventory to a local directory as XML instead of sending it:
# local = /opt/go-glpi-agent/inventory

# --- Identification ---
# tag = datacenter-1
# vardir = /opt/go-glpi-agent/var

# --- Scheduling (used by `daemon` mode / the rc.d service) ---
# delaytime = 3600        # seconds between cycles (default 3600)
# lazy = 1                # skip the send when the server did not request it
# force = 0               # send even if the server did not request it

# --- Collection ---
# scan-processes = 0      # include running processes in the inventory
# no-category = printer,software   # comma-separated categories to skip
# backend-collect-timeout = 180    # per-collector timeout, seconds

# --- HTTP / TLS ---
# user = glpi
# password = secret
# proxy = http://proxy.example.com:3128
# no-compression = 0      # 1 = send uncompressed JSON
# no-ssl-check = 0        # 1 = do not verify the server certificate
# ca-cert-file = /etc/ssl/cert.pem

# --- Logging ---
# logger = Stderr         # Stderr | File | Syslog
# logfile = /var/log/go-glpi-agent.log
# logfacility = LOG_DAEMON
# debug = 0
