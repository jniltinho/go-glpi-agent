# go-glpi-agent configuration (Windows, installed by the .msi). INI format,
# compatible with the Perl FusionInventory/GLPI agent's agent.cfg.
#
# Default locations on Windows:
#   binary : C:\Program Files\go-glpi-agent\go-glpi-agent.exe
#   config : C:\ProgramData\go-glpi-agent\agent.cfg   (this file)
#   state  : C:\ProgramData\go-glpi-agent\var         (deviceid/agentid)
#
# When installed with `msiexec /i ... SERVER=<url> TAG=<tag>`, the installer
# appends the matching lines below on first install. Otherwise, uncomment and
# edit `server` yourself, then reload the Scheduled Task.

# --- Target (at least one of server/local) ---
# GLPI 10+ native endpoint (JSON); falls back to legacy XML/PROLOG automatically.
# server = http://glpi.example.com/front/inventory.php
# Or write the inventory to a local directory as XML instead of sending it:
# local = C:\ProgramData\go-glpi-agent\inventory

# --- Identification ---
# tag = windows-fleet

# --- Collection ---
# scan-processes = 0
# no-category = printer,software
# backend-collect-timeout = 180

# --- Logging ---
# logger = File
# logfile = C:\ProgramData\go-glpi-agent\go-glpi-agent.log
# debug = 0
